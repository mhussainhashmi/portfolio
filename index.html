<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hussein Hashmi</title>

  <!-- Bootstrap 5 with dark mode support -->

<link 
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
  rel="stylesheet"
  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
  crossorigin="anonymous"
/>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Fonts -->
  <link 
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter:wght@300;400;500&display=swap" 
    rel="stylesheet" 
  />

  <!-- Our custom styles -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>

  <!-- ===== LOADER (covers page on first load) ===== -->
  <div id="loader">
    <div id="loader-bg"></div>
    <div id="loader-content">
      <div id="loader-letter">H.</div>
      <div id="loader-bar-track">
        <div id="loader-bar-fill"></div>
        <div id="loader-bar-shine"></div>
      </div>
      <div id="loader-percent">loading <span id="loader-num">0</span>%</div>
    </div>
  </div>

  <!-- ===== MAIN WEBSITE (hidden until loader finishes) ===== -->
  <div id="main-page">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top" id="main-navbar">
      <div class="container">

        <!-- Logo (top-left) -->
        <a class="navbar-brand fw-bold fs-3" href="#home">H.</a>

        <!-- Right side: theme toggle + nav links -->
        <div class="d-flex align-items-center gap-4">

          <!-- Clicking this button runs setTheme() in main.js -->
          <button id="theme-toggle" class="btn btn-link text-white p-0" aria-label="Toggle theme">
            🌙
          </button>

          <ul class="navbar-nav flex-row gap-4">
            <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
            <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
          </ul>

        </div>
      </div>
    </nav>

<!-- HERO SECTION -->
        <section id="home" class="hero-section min-vh-100 d-flex align-items-center">
          <div class="container">
            <div class="row justify-content-center">
              <div class="col-lg-10 text-center">

                <h1 class="display-3 fw-bold mb-3">
                  Hi, I'm <span class="accent-text">Hussein Hashemi</span>
                </h1>

                <h2 class="display-5 mb-4">
                  I build <span id="typing-text" class="typing-effect"></span><span class="cursor">|</span>
                </h2>

                <p class="lead text-secondary mb-5" style="max-width: 650px; margin: 0 auto;">
                  Computer Science student from Karachi who loves turning ideas into clean, functional digital experiences.
                </p>

                <!-- Updated Buttons with magnetic effect -->
                <div class="d-flex justify-content-center gap-3">
                  <a href="#projects" 
                    class="btn btn-primary btn-lg px-5 magnetic-btn" 
                    id="projects-btn">
                    View My Projects
                  </a>
                  
                  <a href="#contact" 
                    class="btn btn-outline-light btn-lg px-5 magnetic-btn" 
                    id="contact-btn">
                    <i class="bi bi-envelope"></i> Get In Touch
                  </a>
                </div>

              </div>
            </div>
          </div>
        </section>

    <!-- ABOUT, SKILLS, PROJECTS, CONTACT — added in Step 3 -->

  </div><!-- end #main-page -->


  <!--
    SCRIPTS at the bottom — so HTML elements exist before JS runs.
    ORDER IS CRITICAL:
      1. Supabase library  → before supabase-config.js needs it
      2. supabase-config   → before main.js needs supabaseClient
      3. Bootstrap JS      → for dropdowns, modals
      4. main.js           → our code, always last
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>

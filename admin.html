<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Hussein Hashmi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
</head>
<body class="bg-dark text-light">

  <div class="container py-5">
    <h2 class="text-center mb-4">Admin Panel</h2>

    <!-- Password Protection -->
    <div id="login-screen">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card bg-dark border-light">
            <div class="card-body">
              <h5 class="card-title text-center">Admin Login</h5>
              <input type="password" id="admin-password" class="form-control mb-3" placeholder="Enter password">
              <button id="login-btn" class="btn btn-primary w-100">Login</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Admin Dashboard (hidden until login) -->
    <div id="admin-dashboard" class="d-none">

      <div class="mb-4">
        <button id="logout-btn" class="btn btn-outline-danger">Logout</button>
      </div>

    <!-- About Section Editor -->
        <div class="card bg-dark border-light mb-4">
        <div class="card-header">About Section</div>
        <div class="card-body">
            <label for="about-text" class="form-label text-light mb-2">About Text</label>
            <textarea 
            id="about-text" 
            class="form-control mb-3" 
            rows="5" 
            placeholder="Write something about yourself here..."></textarea>
            <button id="save-about-btn" class="btn btn-primary">Save About Text</button>
        </div>
        </div>

      <!-- Projects Manager -->
      <div class="card bg-dark border-light mb-4">
        <div class="card-header">Projects Manager</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" id="project-title" class="form-control" placeholder="Project Title">
            </div>
            <div class="col-md-6">
              <input type="text" id="project-link" class="form-control" placeholder="Project Link">
            </div>
            <div class="col-12">
              <textarea id="project-desc" class="form-control" rows="3" placeholder="Project Description"></textarea>
            </div>
            <div class="col-12">
              <input type="text" id="project-image" class="form-control" placeholder="Image URL">
            </div>
          </div>
          <button id="add-project-btn" class="btn btn-success mt-3">Add Project</button>
        </div>
      </div>

      <!-- Contact Messages -->
      <div class="card bg-dark border-light">
        <div class="card-header">Received Messages</div>
        <div class="card-body" id="messages-list">
          <!-- Messages will appear here -->
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
